name: CD

# ─── When does this run? ────────────────────────────────
# Only when code is pushed to main (after a PR merge).
# This is the deployment trigger — main = production.
on:
  push:
    branches: [main]

# ─── Permissions ─────────────────────────────────────────
# packages: write — needed to push Docker images to GHCR
# contents: read  — needed to checkout code
permissions:
  contents: read
  packages: write

jobs:
  # ─── Build and Push Docker Images ──────────────────────
  # WHY: After code passes CI and lands on main, we build
  # production-ready Docker images and push them to GitHub
  # Container Registry (ghcr.io). Any deployment target
  # (cloud server, Kubernetes, etc.) pulls from here.
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Docker Buildx ──────────────────────────────────
      # WHY: Buildx is Docker's extended builder. It supports
      # multi-platform builds and better layer caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Authenticate with GHCR ─────────────────────────
      # WHY: GHCR requires authentication to push images.
      # GITHUB_TOKEN is automatically provided by GitHub Actions —
      # no secrets to configure manually.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── Extract metadata for tags ──────────────────────
      # WHY: We tag images with both:
      #   - The git SHA (immutable, for rollbacks: "deploy sha abc123")
      #   - "latest" (convenience, for docker compose pull)
      # This way you always know exactly which commit is running.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      # ─── Build and Push ─────────────────────────────────
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR to speed up subsequent builds.
          # First build is slow, but after that only changed layers rebuild.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.service }}:buildcache,mode=max
