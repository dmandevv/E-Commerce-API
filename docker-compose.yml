services:
  # ─── Infrastructure ─────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ecommerce-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
    volumes:
      - mongodb_data:/data/db
    # WHY healthcheck: ensures MongoDB is accepting connections,
    # not just that the container started. Services that depend
    # on MongoDB won't start until this passes.
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecommerce-network

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U admin -d ecommerce
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: redis-cli ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # WHY start_period 30s: RabbitMQ takes the longest to initialize.
    # This is what caused the original ECONNREFUSED crashes —
    # the container started but the AMQP port wasn't ready yet.
    healthcheck:
      test: rabbitmq-diagnostics -q check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-network

  # ─── API Gateway ────────────────────────────────────────
  gateway:
    image: nginx:alpine
    container_name: ecommerce-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://127.0.0.1:80/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ecommerce-network

  # ─── Microservices ──────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: ecommerce-user-service
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGO_URI: mongodb://admin:admin_password@mongodb:27017/user-service?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # WHY wget not curl: Alpine images don't include curl by default.
    # wget is built into busybox which comes with Alpine.
    healthcheck:
      test: wget -qO- http://127.0.0.1:3001/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecommerce-network

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: ecommerce-product-service
    restart: unless-stopped
    environment:
      PORT: 3002
      MONGO_URI: mongodb://admin:admin_password@mongodb:27017/product-service?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://127.0.0.1:3002/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecommerce-network

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    container_name: ecommerce-cart-service
    restart: unless-stopped
    environment:
      PORT: 3003
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672
      CART_TTL: 259200
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://127.0.0.1:3003/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecommerce-network

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce-order-service
    restart: unless-stopped
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://admin:admin_password@postgres:5432/ecommerce?schema=orders
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://127.0.0.1:3004/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecommerce-network

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: ecommerce-payment-service
    restart: unless-stopped
    environment:
      PORT: 3005
      DATABASE_URL: postgresql://admin:admin_password@postgres:5432/ecommerce?schema=payments
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://127.0.0.1:3005/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecommerce-network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: ecommerce-notification-service
    restart: unless-stopped
    environment:
      PORT: 3006
      RABBITMQ_URL: amqp://admin:admin_password@rabbitmq:5672
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@ecommerce.com}
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://127.0.0.1:3006/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ecommerce-network

volumes:
  mongodb_data:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  ecommerce-network:
    driver: bridge
