name: CI

# ─── When does this run? ────────────────────────────────
# On every pull request targeting develop or main.
# This catches bugs BEFORE code reaches staging or production.
on:
  pull_request:
    branches: [develop, main]

# ─── Permissions ─────────────────────────────────────────
# Minimal permissions — CI only reads code, it doesn't push.
permissions:
  contents: read

jobs:
  # ─── Job 1: TypeScript Compilation ─────────────────────
  # WHY: Catches type errors across all services + shared package.
  # This is the fastest check — if types are broken, nothing else matters.
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # Install all workspace dependencies (shared + all services)
      - name: Install dependencies
        run: npm ci

      # Generate Prisma clients — needed before TypeScript can compile
      # order-service and payment-service import from @prisma/order-client
      # and @prisma/payment-client, which don't exist until generated.
      - name: Generate Prisma clients
        run: npm run prisma:generate

      # --build compiles all projects in dependency order:
      # shared → services (since services depend on shared via project references)
      - name: Compile TypeScript
        run: npx tsc --build

  # ─── Job 2: Docker Build Verification ──────────────────
  # WHY: Ensures every service's Dockerfile builds successfully.
  # A passing typecheck doesn't guarantee Docker builds work —
  # Dockerfiles have their own COPY, RUN, and dependency steps
  # that can break independently.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    # Don't waste CI minutes if types are broken
    needs: typecheck

    strategy:
      # Build all services in parallel for speed
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the Docker image but don't push — just verify it compiles.
      # --load imports it into the local Docker daemon so we can test it.
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: ecommerce/${{ matrix.service }}:test

  # ─── Job 3: Integration Smoke Test ─────────────────────
  # WHY: Verifies services actually START and respond to health checks.
  # A Docker image can build fine but crash on startup (missing env vars,
  # bad imports, database connection issues). This catches those.
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Start all containers. --wait uses Docker healthchecks to block
      # until every service reports healthy. No manual sleep needed —
      # healthchecks in docker-compose.yml handle the timing.
      - name: Start services
        run: docker compose up -d --build --wait --wait-timeout 120
        env:
          JWT_SECRET: ci_test_secret
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: ""

      # Verify all containers are healthy and gateway responds
      - name: Run health checks
        run: bash scripts/health-check.sh

      # If anything failed, dump logs so we can debug in the GitHub Actions UI
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=50
